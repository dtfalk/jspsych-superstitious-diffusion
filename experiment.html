    // =====================================================================
    // Initialize jsPsych
    // =====================================================================
    const jsPsych = initJsPsych();

    // =====================================================================
    // helpers.js
    // =====================================================================

    // Global state for experiment metadata
    let subjectId = null;
    let experimentSource = null;

    function setSubjectId(id) {
      subjectId = id;
      jsPsych.data.addProperties({ subjectId: id });
    }

    function setExperimentSource(source) {
      experimentSource = source;
      jsPsych.data.addProperties({ experimentSource: source });
    }

    function getArticle(str) {
      const upper = str.toString().toUpperCase();
      const vowelSoundLetters = ['A', 'E', 'F', 'H', 'I', 'L', 'M', 'N', 'O', 'R', 'S', 'X'];
      const vowelSoundNumbers = ['8', '11', '18', '80', '800', '8000'];
      if (vowelSoundLetters.includes(upper) || vowelSoundNumbers.includes(upper)) {
        return 'an';
      }
      return 'a';
    }

    function saveJsonFile(stepName, payload) {
      try {
        const key = stepName.replace(/\s+/g, '_').toLowerCase() + '_data';
        jsPsych.data.getLastTrialData().addToAll({ [key]: payload });
      } catch(e) {
        console.warn('[cognition] Could not inject step data:', stepName, e);
      }
    }

    function saveStimulusMap() {
      if (typeof STIMULUS_MAP === 'undefined') {
        console.log('No STIMULUS_MAP found; skipping stimulus map save.');
        return;
      }
      const decodedMap = {};
      Object.keys(STIMULUS_MAP).forEach(hexId => {
        const meta = _decodeStimulusMeta(hexId);
        decodedMap[hexId] = {
          obfuscated_filename: `${hexId}.mp4`,
          original_filename: meta ? `${meta.letter}_${meta.index}.mp4` : null,
          trial_type: meta ? meta.trialType : null,
          letter: meta ? meta.letter : null,
          index: meta ? meta.index : null,
          encoded: STIMULUS_MAP[hexId]
        };
      });
      saveJsonFile('Stimulus Map', {
        total_stimuli: Object.keys(STIMULUS_MAP).length,
        mappings: decodedMap
      });
    }

    let practiceTrials = [];
    let actualTrials = [];

    function recordVideoTrial(data) {
      const stimulusPath = Array.isArray(data.stimulus) ? data.stimulus[0] : (typeof data.stimulus === 'string' ? data.stimulus : null);
      console.log('recordVideoTrial called, Stimulus Path: ', stimulusPath);

      let stimulusNumber = null;
      let stimulusType = null;
      let trialType = null;
      let obfuscatedFilename = null;
      let originalFilename = null;

      const hexMatch = stimulusPath.match(/([a-f0-9]{16,})\.mp4/i);
      if (hexMatch && typeof _decodeStimulusMeta === 'function') {
        const hexId = hexMatch[1];
        obfuscatedFilename = `${hexId}.mp4`;
        const meta = _decodeStimulusMeta(hexId);
        if (meta) {
          stimulusNumber = String(meta.index);
          stimulusType = meta.letter;
          trialType = meta.trialType;
          originalFilename = `${meta.letter}_${meta.index}.mp4`;
        }
      }

      if (!trialType) {
        const parts = stimulusPath.split('/');
        const file = parts[parts.length - 1];
        const fileWithoutExt = file.replace(/\.mp4.*$/, '');
        stimulusNumber = fileWithoutExt.split('_')[1];
        stimulusType = parts[parts.length - 2];
        trialType = parts[parts.length - 3].replace('-stimuli', '');
        originalFilename = file;
        obfuscatedFilename = null;
      }

      const spacebarScreenPresentedTimestamp = data.spacebar_screen_presented_timestamp;
      const spacebarPressedTimestamp = data.spacebar_pressed_timestamp;
      const videoStartTimestamp = data.video_start_timestamp;
      const responseTimestamp = data.response_timestamp;
      const videoEndTimestamp = typeof window.__jspsych_video_ended === 'number' ? window.__jspsych_video_ended : -1;

      const preVideoWaitTime = spacebarPressedTimestamp - spacebarScreenPresentedTimestamp;
      const videoPresentationLag = videoStartTimestamp - spacebarPressedTimestamp;
      const responseTime = responseTimestamp - videoStartTimestamp;
      const delayTime = videoEndTimestamp === -1 ? -1 : responseTimestamp - videoEndTimestamp;
      const totalTime = responseTimestamp - spacebarScreenPresentedTimestamp;

      const responseKey = data.response;

      let trialNumber = null;
      if (trialType === "practice") { trialNumber = practiceTrials.length + 1; }
      else if (trialType === "actual") { trialNumber = actualTrials.length + 1; }

      const blockNumber = data.block_number || null;

      let outcome = null;
      const signalLetter = CONFIG.targetLetters[0];
      const isSignal = stimulusType === signalLetter;
      const isCorrect = responseKey.toUpperCase() === stimulusType.toUpperCase();
      if (isSignal && isCorrect) outcome = 'true_positive';
      else if (isSignal && !isCorrect) outcome = 'false_negative';
      else if (!isSignal && isCorrect) outcome = 'true_negative';
      else if (!isSignal && !isCorrect) outcome = 'false_positive';

      const trialSummary = {
        "Trial Type": trialType,
        "Block Number": blockNumber,
        "Trial Number": trialNumber,
        "Stimulus Number": stimulusNumber,
        "Stimulus Character": stimulusType,
        "Original Filename": originalFilename,
        "Obfuscated Filename": obfuscatedFilename,
        "Response Character": responseKey,
        "Response Classification": outcome,
        "Trial Presented Timestamp": spacebarScreenPresentedTimestamp,
        "Begin Stimulus Key Press Timestamp": spacebarPressedTimestamp,
        "Stimulus Video Started Timestamp": videoStartTimestamp,
        "Subject Response Timestamp": responseTimestamp,
        "Stimulus Video Completed Timestamp": videoEndTimestamp,
        "Pre Stimulus Video Wait Time": preVideoWaitTime,
        "Time Between Key Press and Video Start": videoPresentationLag,
        "Response Time": responseTime,
        "Time After Video End Before Decision Made": delayTime,
        "Total Trial Time": totalTime
      };

      try {
        jsPsych.data.getLastTrialData().addToAll(trialSummary);
      } catch (e) {
        console.warn('Could not inject trial summary into jsPsych data:', e);
      }

      if (trialType === 'practice') { practiceTrials.push(trialSummary); }
      else if (trialType === "actual") { actualTrials.push(trialSummary); }
    }

    function flushTrials(trialType) {
      let trials = null;
      if (trialType === "practice") { trials = practiceTrials; }
      else if (trialType === "actual") { trials = actualTrials; }
      if (trials.length === 0) return;
      saveJsonFile(`${trialType[0].toUpperCase() + trialType.slice(1)} Trials`, { trials: trials });
      if (trialType === "practice") { practiceTrials = []; }
      else if (trialType === "actual") { actualTrials = []; }
    }

        nPerCondition: 5,

      main: {
        folder: "actual-stimuli",

        <div style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center;">
          <div style="max-width:40rem; text-align:left;">
            <h2>Break</h2>
            <p>You have completed the first block of trials.</p>
            <p>Take a short break if you like, then press <strong>${CONFIG.continueKey}</strong> to continue to the next block.</p>
          </div>
        </div>
      `,
      choices: [`${CONFIG.continueKey}`],
      on_finish: data => {
        const end_timestamp = performance.now();
        const start_timestamp = end_timestamp - data.rt;
        saveJsonFile('Break Screen', {
          reaction_time_ms: data.rt,
          start_timestamp,
          end_timestamp
        });
        flushTrials('actual');
      }
    };

    // =====================================================================
    // 10-actual-complete.js
    // =====================================================================

    const actual_trials_complete_screen = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center;">
          <div style="max-width:40rem; text-align:left;">
            <h2>Trials Complete</h2>
            <p>You have completed the main portion of the experiment.</p>
            <p>Press <strong>${CONFIG.continueKey}</strong> to continue.</p>
          </div>
        </div>
      `,
      choices: [`${CONFIG.continueKey}`],
      on_finish: function(data) {
        const end_timestamp = performance.now();
        const start_timestamp = end_timestamp - data.rt;
        saveJsonFile('Actual Trials Complete', {
          time_on_screen: data.rt,
          start_timestamp,
          end_timestamp
        });
        flushTrials('actual');
      }
    };

    // =====================================================================
    // 11-questionnaires-intro.js
    // =====================================================================

    const questionnaires_intro_screen = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center;">
          <div style="max-width:40rem; text-align:left;">
            <h2>Questionnaires</h2>
            <p>You will now respond to some questionnaires.</p>
            <p>Press <strong>spacebar</strong> to continue.</p>
          </div>
        </div>
      `,
      choices: [" "],
      on_finish: function(data) {
        const end_timestamp = performance.now();
        const start_timestamp = end_timestamp - data.rt;
        saveJsonFile('Questionnaires Intro Screen', {
          time_on_screen: data.rt,
          start_timestamp,
          end_timestamp
        });
      }
    };

    // =====================================================================
    // 12-tellegen-scale.js
    // =====================================================================

    const tellegen_questions = [
      { prompt: 'Sometimes I feel and experience things as I did when I was a child.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'I can be greatly moved by eloquent or poetic language.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'While watching a movie, a T.V. show, or a play, I may become so involved that I forget about myself and my surroundings and experience the story as if I were taking part in it.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'If I stare at a picture and then look away from it, I can sometimes "see" an image of the picture, almost as if I were looking at it.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'Sometimes I feel as if my mind could envelop the whole world.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'I like to watch cloud shapes change in the sky.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'If I wish, I can imagine (or daydream) some things so vividly that they hold my attention as a good movie or story does.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'I think I really know what some people mean when they talk about mystical experiences.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'I sometimes "step outside" my usual self and experience an entirely different state of being.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'Textures - such as wool, sand, wood - sometimes remind me of colors or music.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'Sometimes I experience things as if they were doubly real.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: "When I listen to music, I can get so caught up in it that I don't notice anything else.", options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'If I wish, I can imagine that my body is so heavy that I could not move it if I wanted to.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'I can often somehow sense the presence of another person before I actually see or hear her/him/them.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'The crackle and flames of a wood fire stimulate my imagination.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'It is sometimes possible for me to be completely immersed in nature or in art and to feel as if my whole state of consciousness has somehow been temporarily altered.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'Different colors have distinctive and special meaning to me.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'I am able to wander off into my own thoughts while doing a routine task, and then find a few minutes later that I have completed it.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'I can sometimes recollect certain past experiences in my life with such clarity and vividness that it is like living them again or almost so.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'Things that might seem meaningless to others often make sense to me.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'While acting in a play, I think I could really feel the emotions of the character and "become" her/him for the time being, forgetting both myself and the audience.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: "My thoughts often don't occur as words but as visual images.", options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'I often take delight in small things (like; the five-pointed star shape that appears when you cut an apple across the core or the colors in soap bubbles).', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'When listening to organ music or other powerful music I sometimes feel as if I am being lifted into the sky.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'Sometimes I can change noise into music by the way I listen to it.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'Some of my most vivid memories are called up by scents or sounds.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'Certain pieces of music remind me of pictures or moving patterns of color.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'I often know what someone is going to say before he/she/they says it.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: "I often have 'physical memories'; for example, after I've been swimming, I may feel as if I'm in the water.", options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'The sound of a voice can be so fascinating to me that I can just go on listening to it.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'At times I somehow feel the presence of someone who is not physically there.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'Sometimes thoughts and images come to me without the slightest effort on my part.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'I find that different odors have different colors.', options: ['0 - Never', '1', '2', '3 - Always'], required: true },
      { prompt: 'I can be deeply moved by a sunset.', options: ['0 - Never', '1', '2', '3 - Always'], required: true }
    ];

    const tellegen_questionnaire = {
      type: jsPsychSurveyMultiChoice,
      preamble: `
        <style>
          .jspsych-survey-multi-choice-question { margin-bottom: 2rem; }
          .jspsych-survey-multi-choice-option { display: block; margin: 0.5rem 0; }
          .jspsych-survey-multi-choice-option input { margin-right: 0.5rem; }
        </style>
        <div style="max-width: 50rem; margin: 0 auto; text-align: left;">
          <h1 style="text-align: center; margin-bottom: 1.5rem;">Personal Attitudes and Experiences</h1>
          <p style="margin-bottom: 2rem;">This questionnaire consists of questions about experiences that you may have had in your life. We are interested in how often you have these experiences. It is important, however, that your answers show how often these experiences happen to you when you are not under the influence of alcohol or drugs.</p>
        </div>
      `,
      questions: tellegen_questions,
      randomize_question_order: false,
      on_finish: function(data) {
        const end_timestamp = performance.now();
        const start_timestamp = end_timestamp - data.rt;
        const responses = data.response || {};
        const questions_data = tellegen_questions.map((q, i) => ({
          question_number: i + 1,
          question_text: q.prompt,
          response: responses[`Q${i}`] || null,
          score: responses[`Q${i}`] ? parseInt(responses[`Q${i}`][0]) : null
        }));

        const tellegen_scores = questions_data.map(q => q.score);
        const tellegen_total = tellegen_scores.reduce((sum, s) => sum + (s || 0), 0);
        try {
          jsPsych.data.getLastTrialData().addToAll({
            tellegen_scores: tellegen_scores,
            tellegen_total: tellegen_total,
            tellegen_questions: questions_data
          });
        } catch (e) {
          console.warn('Could not inject Tellegen data into jsPsych store:', e);
        }

        saveJsonFile('Tellegen Responses', {
          start_timestamp,
          end_timestamp,
          reaction_time_ms: data.rt,
          questions: questions_data
        });
      }
    };

    // =====================================================================
    // 13-closing-screen.js
    // =====================================================================

    const closing_screen = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: "<p>Thank you for participating.</p><p>Press any key to finish.</p>",
      on_finish: function(data) {
        const end_timestamp = performance.now();
        const start_timestamp = end_timestamp - data.rt;
        saveStimulusMap();
        saveJsonFile('Closing Screen', {
          reaction_time_ms: data.rt,
          start_timestamp,
          end_timestamp
        });
        flushTrials('practice');
        flushTrials('actual');
      }
    };

    // =====================================================================
    // timeline.js — Build and run
    // =====================================================================

    const timeline = [];

    timeline.push(
      subject_source,
      id_entry,
      consent_screen,
      nonconsent_screen,
      experiment_intro_screen,
      practice_intro_screen,
      practice_trials,
      practice_trials_complete_screen,
      actual_intro_screen,
      actual_trials_block_1,
      actual_break,
      actual_trials_block_2,
      actual_trials_complete_screen,
      questionnaires_intro_screen,
      tellegen_questionnaire,
      closing_screen
    );

    jsPsych.run(timeline);
  </script>
</html>
